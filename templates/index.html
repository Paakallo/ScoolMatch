<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoolMatch</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
            background-color: #f8f9fa;
        }
        
        /* Styl dla całego kontenera */
        #wrapper {
            transition: all 0.3s ease;
        }

        /* Styl dla paska bocznego */
        #sidebar-wrapper {
            min-height: 100vh;
            width: 250px;
            transition: all 0.3s ease;
            background-color: #ffffff;
            border-right: 1px solid #dee2e6;
        }

        /* Klasa dodawana przez JS, aby schować pasek */
        #wrapper.toggled #sidebar-wrapper {
            margin-left: -250px;
        }

        /* Główny kontener na treść */
        #page-content-wrapper {
            width: 100%;
            transition: all 0.3s ease;
        }

        /* Kosmetyka zakładek */
        .list-group-item {
            border: none;
            padding: 15px 20px;
            font-weight: 500;
        }
        
        .list-group-item:hover {
            background-color: #f1f3f5;
        }
    </style>
</head>
<body>

    <div class="d-flex" id="wrapper">

        <div id="sidebar-wrapper">
            <div class="sidebar-heading d-flex justify-content-between align-items-center p-3 border-bottom">
                <div class="d-flex align-items-center">
                    <i class="bi bi-person-circle fs-2 text-primary"></i>
                    <span class="ms-2 fw-bold">Twój Profil</span>
                </div>
                <button class="btn btn-light btn-sm" id="close-menu-toggle" title="Schowaj panel">
                    <i class="bi bi-layout-sidebar"></i>
                </button>
            </div>
            
            <div class="list-group list-group-flush mt-3">
                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="bi bi-search me-2"></i> Wybór szkoły
                </a>
                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="bi bi-question-circle me-2"></i> QA (Pytania i Odpowiedzi)
                </a>
                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="bi bi-play-btn me-2"></i> Filmiki szkolne
                </a>
                <a href="#" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="bi bi-cash-coin me-2"></i> Stypendia
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-light bg-light border-bottom p-3">
                <button class="btn btn-primary" id="open-menu-toggle">
                    <i class="bi bi-list"></i> Menu
                </button>
            </nav>

            <div class="container-fluid p-5">
                <h1 class="display-4 fw-bold text-primary">ScoolMatch</h1>
                <p class="lead">Wspierane przez fundację "Dom na Skraju" <3</p>
                
                <div class="card mt-4 shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title">Tutaj znajdzie się wyszukiwarka!</h4>
                        <p class="card-text">To miejsce na główną treść, filtry i bazę szkół, o której wcześniej rozmawialiśmy.</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const wrapper = document.getElementById("wrapper");
        const openToggle = document.getElementById("open-menu-toggle");
        const closeToggle = document.getElementById("close-menu-toggle");

        // Otwieranie/Zamykanie przyciskiem z nawigacji głównej
        openToggle.addEventListener("click", function(e) {
            e.preventDefault();
            wrapper.classList.toggle("toggled");
        });

        // Zamykanie przyciskiem wewnątrz panelu (zgodnie ze szkicem)
        closeToggle.addEventListener("click", function(e) {
            e.preventDefault();
            wrapper.classList.toggle("toggled");
        });
    </script>
</body>
</html>
