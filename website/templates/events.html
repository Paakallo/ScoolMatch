<style>
    .event-card { transition: all 0.2s ease-in-out; border-left: 5px solid #0d6efd; }
    .event-card:hover { transform: translateX(5px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
    .event-date-box { background-color: #e9ecef; border-radius: 10px; text-align: center; padding: 10px; min-width: 80px; }
    .event-date-box .day { font-size: 1.5rem; font-weight: bold; line-height: 1; color: #0d6efd; }
    .event-date-box .month { font-size: 0.85rem; text-transform: uppercase; font-weight: 600; color: #6c757d; }
    .btn-save-event { transition: all 0.2s; }
    .btn-save-event:hover { transform: scale(1.1); }
</style>

<div class="container py-3" style="max-width: 900px;">
    <div class="text-center mb-4">
        <h1 class="display-5 fw-bold text-primary"><i class="bi bi-calendar-check"></i> Wydarzenia blisko Ciebie</h1>
        <p class="lead text-muted">Znajdź dni otwarte, warsztaty i spotkania informacyjne w Twojej okolicy.</p>
    </div>

    <div class="card shadow-sm mb-4 border-0 bg-light">
        <div class="card-body p-4">
            <h5 class="card-title mb-3"><i class="bi bi-geo-alt-fill text-danger"></i> Filtruj po odległości</h5>
            <label for="distanceRange" class="form-label fw-bold">
                Maksymalna odległość: <span id="distanceValue" class="text-primary fs-5">15</span> km
            </label>
            <input type="range" class="form-range" min="1" max="50" step="1" value="15" id="distanceRange">
            <div class="d-flex justify-content-between text-muted small mt-1">
                <span>1 km (Gdańsk - Nowy Port)</span>
                <span>50 km (Całe Trójmiasto i okolice)</span>
            </div>
        </div>
    </div>

    <div id="events-list" class="d-flex flex-column gap-3">
        </div>
    
    <div id="no-events-msg" class="text-center text-muted py-5 d-none">
        <i class="bi bi-emoji-frown fs-1"></i>
        <h4 class="mt-3">Brak wydarzeń w tym promieniu</h4>
        <p>Spróbuj zwiększyć odległość na suwaku powyżej.</p>
    </div>
</div>

<script>
    (function() {
        let allEvents = []; 

        const eventsList = document.getElementById('events-list');
        const noEventsMsg = document.getElementById('no-events-msg');
        const distanceRange = document.getElementById('distanceRange');
        const distanceValue = document.getElementById('distanceValue');

        // Pobranie zapisanych wydarzeń z LocalStorage
        function getSavedEvents() {
            return JSON.parse(localStorage.getItem('sm_saved_events')) || [];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const months = ["Sty", "Lut", "Mar", "Kwi", "Maj", "Cze", "Lip", "Sie", "Wrz", "Paź", "Lis", "Gru"];
            return { day: date.getDate(), month: months[date.getMonth()] };
        }

        function renderEvents(maxDistance) {
            eventsList.innerHTML = ''; 
            const savedEvents = getSavedEvents();
            
            const filteredEvents = allEvents
                .filter(ev => ev.distance <= maxDistance)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            if (filteredEvents.length === 0) {
                noEventsMsg.classList.remove('d-none');
            } else {
                noEventsMsg.classList.add('d-none');
                
                filteredEvents.forEach(ev => {
                    const dateObj = formatDate(ev.date);
                    // Sprawdzamy czy wydarzenie jest w zapisanych
                    const isSaved = savedEvents.some(saved => saved.id === ev.id);
                    const btnClass = isSaved ? 'btn-danger' : 'btn-outline-danger';
                    const iconClass = isSaved ? 'bi-heart-fill' : 'bi-heart';
                    const btnTitle = isSaved ? 'Usuń z zapisanych' : 'Zapisz wydarzenie';
                    
                    const card = document.createElement('div');
                    card.className = 'card shadow-sm border-0 event-card';
                    card.innerHTML = `
                        <div class="card-body p-3 d-flex align-items-center gap-3">
                            <div class="event-date-box shadow-sm">
                                <div class="month">${dateObj.month}</div>
                                <div class="day">${dateObj.day}</div>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="card-title mb-1 fw-bold">${ev.title}</h5>
                                <h6 class="card-subtitle text-muted mb-2"><i class="bi bi-building"></i> ${ev.school}</h6>
                                <span class="badge bg-light text-dark border"><i class="bi ${ev.icon} me-1"></i> ${ev.type}</span>
                            </div>
                            <div class="text-end d-flex flex-column align-items-end justify-content-between h-100">
                                <button class="btn btn-sm ${btnClass} rounded-circle btn-save-event mb-2" data-id="${ev.id}" title="${btnTitle}" style="width: 35px; height: 35px;">
                                    <i class="bi ${iconClass}"></i>
                                </button>
                                <div class="d-none d-sm-block">
                                    <div class="fw-bold text-primary">${ev.distance.toFixed(1)} km</div>
                                </div>
                            </div>
                        </div>
                    `;
                    eventsList.appendChild(card);
                });

                // Podpinamy logikę do przycisków "Zapisz"
                document.querySelectorAll('.btn-save-event').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const evId = parseInt(this.getAttribute('data-id'));
                        const evObj = allEvents.find(e => e.id === evId);
                        let saved = getSavedEvents();

                        // Jeśli już zapisane -> usuwamy. Jeśli nie -> dodajemy.
                        if (saved.some(e => e.id === evId)) {
                            saved = saved.filter(e => e.id !== evId);
                        } else {
                            saved.push(evObj);
                        }
                        
                        localStorage.setItem('sm_saved_events', JSON.stringify(saved));
                        renderEvents(parseFloat(distanceRange.value)); // Odświeża UI żeby zmienić serduszko
                    });
                });
            }
        }

        distanceRange.addEventListener('input', function() {
            const currentDist = parseFloat(this.value);
            distanceValue.innerText = currentDist;
            renderEvents(currentDist);
        });

        async function fetchEventsFromDatabase() {
            eventsList.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted">Ładowanie wydarzeń z bazy...</p></div>';
            
            try {
                const response = await fetch('/api/events');
                if (!response.ok) throw new Error("Błąd sieci");
                
                allEvents = await response.json();
                renderEvents(parseFloat(distanceRange.value));
            } catch (error) {
                console.error("Błąd pobierania wydarzeń:", error);
                eventsList.innerHTML = '<div class="alert alert-danger shadow-sm border-0 mt-3"><i class="bi bi-exclamation-triangle-fill me-2"></i> Nie udało się załadować wydarzeń z bazy danych.</div>';
            }
        }

        fetchEventsFromDatabase();
    })();
</script>
